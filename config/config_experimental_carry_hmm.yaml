project:
  name: finance-meta-labeling-pipeline
  frequency: weekly
  rebalance: weekly
assets:
  tickers:
  - SPY
  - TLT
  - GLD
  - VEA
  - VWO
  - HYG
  - VNQ
  vix_ticker: ^VIX
macro:
  fred_series:
  - CPIAUCSL
  - UNRATE
  - INDPRO
  - FEDFUNDS
  - DGS10
  - T10Y2Y
  - BAA10Y
split:
  data_start: '2000-01-01'
  train_start: '2006-01-01'
  train_end: '2020-12-31'
  test_start: '2021-01-01'
  test_end: null
  require_full_universe: true
features:
  momentum_windows:
  - 4
  - 12
  - 26
  - 52
  volatility_windows:
  - 4
  - 12
  - 26
  trend_windows:
  - 10
  - 40
  macro_lag_weeks: 4
  winsorize_pct: 0.01
  hmm_regime_enabled: true
  hmm_regime_states: 4
  hmm_regime_random_state: 42
  hmm_regime_in_m2: false
labels:
  horizon_weeks: 4
  positive_threshold: 0.005
  negative_threshold: -0.005
  transaction_cost_threshold: 0.001
models:
  m1:
    type: rule_based
    long_threshold: 0.5
    short_threshold: -0.5
    weights:
      momentum: 0.4
      trend: 0.2
      macro: 0.2
      carry: 0.1
      risk_penalty: 0.1
    min_nonzero_signals: 100
    optimize_thresholds: true
    asset_class_tilts: true
    allow_short: false
    long_quantile: 0.58
    short_quantile: 0.22
    long_quantile_min: 0.52
    long_quantile_max: 0.68
    short_quantile_min: 0.12
    short_quantile_max: 0.32
    quantile_step: 0.02
    allocation_mode: top_k
    top_k: 3
    top_k_min_score: 0.0
    conviction_sizing: false
    tune_objective: portfolio
    tune_turnover_penalty: 0.1
    tune_drawdown_penalty: 0.5
    tune_drawdown_cap: 0.25
    use_hmm_regime: true
    hmm_regime_blend: 0.25
  m2:
    type: logistic_regression
    threshold: 0.55
    calibrate: true
portfolio:
  allow_short: true
  max_abs_asset_weight: 0.25
  max_gross_exposure: 1.0
  transaction_cost_bps: 5
  base_budget_per_asset: 0.142857
  sizing_mode: linear
  vol_target_ann: 0.12
  vol_target_lookback_weeks: 26
  vol_target_max_scale: 2.0
benchmarks:
  sixty_forty:
    SPY: 0.15
    VEA: 0.15
    VWO: 0.15
    VNQ: 0.15
    TLT: 0.2
    HYG: 0.2
    GLD: 0.0
paths:
  raw: data/raw
  processed: data/processed
  features: data/features
  predictions: data/predictions
  backtests: data/backtests
  runs: runs
llm_features:
  enabled: false
  cache_dir: data/features/llm_cache
